<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock paper scissors</title>
    <script type="module" src="script.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Pixel&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <section class="scoreBoard">
            <h3>Round: </h3>
            <p id="roundCount">0</p>
            <h3>Human Score: </h3>
            <p id="humanScoreCount">0</p>
            <h3>Computer Score: </h3>
            <p id="computerScoreCount">0</p>
        </section>
    </header>

    <section class="main">
        <section class="frontImage">
            <img src="Media/front.png" alt="Opening Image" id="coverImage">
        </section>

        <section class="content">
            <div class="announcementBanner">
            </div>

            <div class="buttonGroup">
                <button id="rockBtn" class="actionButton">
                    <img src="Media/rock.png" alt="">
                </button>
                <button id="paperBtn" class="actionButton">
                    <img src="Media/paper.png" alt="">
                </button>
                <button id="scissorsBtn" class="actionButton">
                    <img src="Media/scissors.png" alt="">
                </button>
            </div>

            <div>
                <button id="playAgain" class="playAgainBtn">Play Again</button>
            </div>
        </section>

    </section>

    <footer class="footer">
        <div class="footer-links">
            <a href="https://github.com/Mayn18" target="_blank" aria-label="GitHub">GitHub</a>
        </div>
    </footer>
</body>

</html>
